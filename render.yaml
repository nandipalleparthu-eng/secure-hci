services:
  - type: web
    name: secure-hci-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python webapp.py
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: ALLOWED_ORIGINS
        value: "*"
